<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Composiciones Musicales para el Alma</title>

<!-- OPEN GRAPH -->
<meta property="og:type" content="website">
<meta property="og:title" content="Composiciones Musicales para el Alma">
<meta property="og:description" content="Una colección iniciática de obras musicales. Explora los Videos Karaoke y Canciones.">
<meta property="og:image" content="https://lucksys.github.io/canciones/portada.jpg">
<meta property="og:image:secure_url" content="https://lucksys.github.io/canciones/portada.jpg">
<meta property="og:image:type" content="image/jpg">
<meta property="og:image:width" content="1168">
<meta property="og:image:height" content="784">
<meta property="og:url" content="https://lucksys.github.io/canciones/">

<!-- TWITTER -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Composiciones Musicales para el Alma">
<meta name="twitter:description" content="Un viaje musical iniciático hacia la luz interior.">
<meta name="twitter:image" content="https://lucksys.github.io/canciones/portada.jpg">

<style>
:root {
    --gold: #d4af37;
    --bg: rgba(0,0,0,0.92);
    --panel: rgba(10,10,10,0.78);
    --card: #111;
    --text: #f3e7b3;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Georgia, serif;
    background: url("portada.jpg") no-repeat center center fixed;
    background-size: cover;
    color: var(--gold);
}

.overlay {
    background: var(--bg);
    min-height: 100vh;
    padding: 20px;
}

h1 {
    text-align: center;
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    text-shadow: 0 0 15px var(--gold);
    margin-bottom: 30px;
}

.container {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.column {
    flex: 1;
    min-width: 320px;
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 15px;
    background: var(--panel);
}

.column h2 {
    text-align: center;
    border-bottom: 1px solid var(--gold);
    padding-bottom: 10px;
}

/* UNA SOLA COLUMNA */
.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 25px;
}

.card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--gold);
    border-radius: 12px;
    overflow: hidden;
    transition: 0.25s;
}

.card:hover {
    transform: scale(1.02);
    box-shadow: 0 0 20px var(--gold);
}

.card-link {
    text-decoration: none;
    color: inherit;
    display: block;
}

.card-media {
    background: #000;
}

.card img {
    width: 100%;
    height: auto;
    object-fit: contain;
}

.card-title {
    text-align: center;
    padding: 12px;
    color: var(--text);
}

/* BOTÓN INFO */
.info-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 48px;
    height: 48px;
    border: 1px solid var(--gold);
    border-radius: 8px;
    background: rgba(0,0,0,0.7);
    color: var(--gold);
    cursor: pointer;
    z-index: 10;
}

/* POPUP */
.info-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.info-overlay.active {
    display: flex;
}

.info-popup {
    position: relative;
    background: #111;
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 20px;
    max-width: 90%;
    max-height: 70%;
    overflow-y: auto;
    color: var(--text);
}

.info-popup h3 {
    color: var(--gold);
    margin-bottom: 10px;
}

.info-popup p {
    white-space: pre-wrap;
}

.info-close {
    position: absolute;
    top: 10px;
    right: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="overlay">
<h1>Composiciones Musicales para el Alma</h1>

<div class="container">

<div class="column">
<h2>Videos Karaoke</h2>
<div id="videos" class="grid">
<div class="loading">Cargando obras iniciáticas...</div>
</div>
</div>

<div class="column">
<h2>Canciones</h2>
<p class="loading">Próximamente...</p>
</div>

</div>
</div>

<!-- POPUP -->
<div id="infoOverlay" class="info-overlay" role="dialog" aria-modal="true">
<div class="info-popup">
<span id="infoClose" class="info-close">✖</span>
<h3 id="infoTitulo"></h3>
<p id="infoTexto"></p>
</div>
</div>

<script>
(async function(){

const contenedor = document.getElementById("videos");
const overlay = document.getElementById("infoOverlay");
const texto = document.getElementById("infoTexto");
const tituloPopup = document.getElementById("infoTitulo");
const cerrar = document.getElementById("infoClose");

function abrirInfo(titulo, info){
    tituloPopup.textContent = titulo;
    texto.textContent = info;
    overlay.classList.add("active");
}

function cerrarInfo(){
    overlay.classList.remove("active");
}

cerrar.onclick = cerrarInfo;
overlay.onclick = (e)=>{ if(e.target===overlay) cerrarInfo(); };

document.addEventListener("keydown",(e)=>{
    if(e.key==="Escape") cerrarInfo();
});

try{
const res = await fetch("Lista_de_Enlaces_de_Videos.txt",{cache:"no-store"});
if(!res.ok) throw new Error();

const txt = await res.text();
const bloques = txt.split("------------------------------------------------------------------------------");

contenedor.innerHTML="";
let total=0;

for(let b of bloques){

let lineas = b.split("\n")
.map(l=>l.trim())
.filter(l=>l && !/^[-]{3,}$/.test(l));

if(lineas.length<3) continue;

let match = lineas[0].match(/^(\d+)\s*-\s*(.+)$/);
if(!match) continue;

let indice = parseInt(match[1]);
if(indice<=0) continue;

let titulo = match[2].replaceAll("_"," ");

let url = lineas.reverse().find(l=>l.includes("github.io"));
if(!url) continue;

/* INFO MULTILINEA */
let info="";
let leyendo=false;

for(let l of lineas){

if(/^info\s*:/i.test(l)){
leyendo=true;
info+=l.replace(/^info\s*:/i,"").trim()+"\n";
continue;
}

if(leyendo){
if(/^https?:\/\//.test(l)) break;
if(/^\d+\s*-/.test(l)) break;
info+=l+"\n";
}
}

info = info.trim() || "Sin información disponible.";

try{

const r = await fetch(url,{cache:"no-store"});
if(!r.ok) continue;

const html = await r.text();
const doc = new DOMParser().parseFromString(html,"text/html");

let meta = doc.querySelector('meta[name="twitter:image"]');
if(!meta) continue;

let imgUrl = meta.content;
if(!imgUrl) continue;

let clean = imgUrl.split("?")[0].split("#")[0].toLowerCase();
if(!clean.match(/\.(jpg|jpeg|png)$/)) continue;

let card = document.createElement("div");
card.className="card";

let btn = document.createElement("button");
btn.className="info-btn";
btn.textContent="Info";

btn.onclick=(e)=>{
e.preventDefault();
e.stopPropagation();
abrirInfo(indice+" - "+titulo, info);
};

let link = document.createElement("a");
link.className="card-link";
link.href=url;
link.target="_blank";
link.rel="noopener noreferrer";

let media = document.createElement("div");
media.className="card-media";

let img = document.createElement("img");
img.src=imgUrl;
img.loading="lazy";
img.decoding="async";

let t = document.createElement("div");
t.className="card-title";
t.textContent=indice+" - "+titulo;

media.appendChild(img);
link.appendChild(media);
link.appendChild(t);

card.appendChild(btn);
card.appendChild(link);
contenedor.appendChild(card);

total++;

}catch{}

}

if(total===0){
contenedor.innerHTML='<div class="error">No se encontraron obras con imagen válida</div>';
}

}catch{
contenedor.innerHTML='<div class="error">Error cargando la lista</div>';
}

})();
</script>

</body>
</html>
