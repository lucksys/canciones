<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Composiciones Musicales para el Alma</title>

<!-- OPEN GRAPH -->
<meta property="og:type" content="website">
<meta property="og:title" content="Composiciones Musicales para el Alma">
<meta property="og:description" content="Una colección iniciática de obras musicales. Explora los Videos Karaoke y Canciones.">
<meta property="og:image" content="https://lucksys.github.io/canciones/portada.jpg">
<meta property="og:image:secure_url" content="https://lucksys.github.io/canciones/portada.jpg">
<meta property="og:image:type" content="image/jpg">
<meta property="og:image:width" content="1168">
<meta property="og:image:height" content="784">
<meta property="og:url" content="https://lucksys.github.io/canciones/">

<!-- TWITTER -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Composiciones Musicales para el Alma">
<meta name="twitter:description" content="Un viaje musical iniciático hacia la luz interior.">
<meta name="twitter:image" content="https://lucksys.github.io/canciones/portada.jpg">

<style>
    :root {
        --gold: #d4af37;
        --bg: rgba(0, 0, 0, 0.92);
        --panel: rgba(10, 10, 10, 0.78);
        --card: #111;
        --text: #f3e7b3;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Georgia, serif;
        background: url("portada.jpg") no-repeat center center fixed;
        background-size: cover;
        color: var(--gold);
    }

    .overlay {
        background: var(--bg);
        min-height: 100vh;
        padding: 20px;
    }

    h1 {
        margin: 0 0 30px;
        text-align: center;
        font-size: clamp(1.8rem, 3vw, 2.8rem);
        letter-spacing: 2px;
        text-shadow: 0 0 15px var(--gold);
    }

    .container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        align-items: flex-start;
    }

    .column {
        flex: 1;
        min-width: 320px;
        border: 1px solid var(--gold);
        padding: 15px;
        border-radius: 12px;
        background: var(--panel);
    }

    .column h2 {
        margin: 0 0 20px;
        text-align: center;
        border-bottom: 1px solid var(--gold);
        padding-bottom: 10px;
        font-size: 1.4rem;
    }

    /* Una sola columna para los videos */
    .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 25px;
    }

    .card {
        position: relative;
        background: var(--card);
        border: 1px solid var(--gold);
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px var(--gold);
    }

    .card-link {
        display: block;
        color: inherit;
        text-decoration: none;
    }

    .card-media {
        position: relative;
        background: #000;
    }

    .card img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: contain;
        background: #000;
    }

    .card-title {
        padding: 12px;
        font-size: 1rem;
        text-align: center;
        color: var(--text);
        line-height: 1.35;
    }

    .loading,
    .error {
        text-align: center;
        opacity: 0.75;
        padding: 20px;
        color: var(--text);
    }

    /* Botón Info */
    .info-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 48px;
        height: 48px;
        border: 1px solid var(--gold);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.72);
        color: var(--gold);
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.5px;
        cursor: pointer;
        z-index: 5;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
        user-select: none;
    }

    .info-btn:active {
        transform: scale(0.96);
    }

    .info-btn:focus-visible {
        outline: 2px solid var(--gold);
        outline-offset: 2px;
    }

    /* Popup / overlay */
    .info-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.72);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 16px;
    }

    .info-overlay.active {
        display: flex;
    }

    .info-popup {
        position: relative;
        width: min(720px, 96vw);
        max-height: min(70vh, 680px);
        overflow: auto;
        background: #101010;
        border: 1px solid var(--gold);
        border-radius: 14px;
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.35);
        padding: 20px 20px 18px;
        color: var(--text);
    }

    .info-popup h3 {
        margin: 0 38px 12px 0;
        color: var(--gold);
        font-size: 1.15rem;
        line-height: 1.3;
    }

    .info-popup p {
        margin: 0;
        line-height: 1.6;
        white-space: pre-wrap;
        font-size: 1rem;
    }

    .info-close {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 38px;
        height: 38px;
        border: 1px solid var(--gold);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.7);
        color: var(--gold);
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
    }

    .info-close:focus-visible {
        outline: 2px solid var(--gold);
        outline-offset: 2px;
    }

    @media (max-width: 700px) {
        .overlay {
            padding: 14px;
        }

        .column {
            min-width: 100%;
        }

        .info-popup {
            width: min(96vw, 96vw);
            max-height: 78vh;
        }
    }
</style>
</head>

<body>
<div class="overlay">
    <h1>Composiciones Musicales para el Alma</h1>

    <div class="container">
        <div class="column">
            <h2>Videos Karaoke</h2>
            <div id="videos" class="grid">
                <div class="loading">Cargando obras iniciáticas...</div>
            </div>
        </div>

        <div class="column">
            <h2>Video-Presentaciones</h2>
            <div class="grid">
                <p class="loading">Próximamente...</p>
            </div>
        </div>
    </div>
</div>

<!-- Popup global -->
<div id="infoOverlay" class="info-overlay" aria-hidden="true">
    <div class="info-popup" role="dialog" aria-modal="true" aria-labelledby="infoTitulo">
        <button type="button" id="infoClose" class="info-close" aria-label="Cerrar">×</button>
        <h3 id="infoTitulo"></h3>
        <p id="infoTexto"></p>
    </div>
</div>

<script>
(function () {
    const contenedor = document.getElementById("videos");
    const infoOverlay = document.getElementById("infoOverlay");
    const infoTitulo = document.getElementById("infoTitulo");
    const infoTexto = document.getElementById("infoTexto");
    const infoClose = document.getElementById("infoClose");

    function abrirInfo(titulo, texto) {
        infoTitulo.textContent = titulo || "Información";
        infoTexto.textContent = texto || "Sin información disponible.";
        infoOverlay.classList.add("active");
        infoOverlay.setAttribute("aria-hidden", "false");
    }

    function cerrarInfo() {
        infoOverlay.classList.remove("active");
        infoOverlay.setAttribute("aria-hidden", "true");
    }

    infoClose.addEventListener("click", cerrarInfo);

    infoOverlay.addEventListener("click", function (e) {
        if (e.target === infoOverlay) {
            cerrarInfo();
        }
    });

    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
            cerrarInfo();
        }
    });

    function limpiarTextoTitulo(texto) {
        return texto.replaceAll("_", " ").trim();
    }

    function extraerDatosBloque(lineas) {
        if (!lineas || lineas.length < 3) return null;

        const primeraLinea = lineas[0] || "";
        const match = primeraLinea.match(/^\s*(\d+)\s*-\s*(.+)$/);
        if (!match) return null;

        const indice = parseInt(match[1], 10);
        const titulo = limpiarTextoTitulo(match[2] || "");

        if (!Number.isFinite(indice) || indice <= 0) return null;

        const urlPagina = [...lineas]
            .reverse()
            .find(l => /^https?:\/\//i.test(l) && !/^info\s*:/i.test(l));

        if (!urlPagina) return null;

        const infoLinea = lineas.find(l => /^info\s*:/i.test(l));
        const infoTexto = infoLinea
            ? infoLinea.replace(/^info\s*:/i, "").trim()
            : "Sin información disponible.";

        return { indice, titulo, urlPagina, infoTexto };
    }

    async function cargarVideos() {
        contenedor.innerHTML = '<div class="loading">Cargando obras iniciáticas...</div>';

        try {
            const res = await fetch("Lista_de_Enlaces_de_Videos.txt", { cache: "no-store" });
            if (!res.ok) throw new Error("No se pudo leer el archivo Lista_de_Enlaces_de_Videos.txt");

            const texto = await res.text();
            const bloques = texto.split("------------------------------------------------------------------------------");

            contenedor.innerHTML = "";

            let total = 0;

            for (const bloqueRaw of bloques) {
                const bloque = bloqueRaw.trim();
                if (!bloque) continue;

                const lineas = bloque
                    .split("\n")
                    .map(l => l.trim())
                    .filter(Boolean)
                    .filter(l => !/^[-]{3,}$/.test(l));

                const datos = extraerDatosBloque(lineas);
                if (!datos) continue;

                const { indice, titulo, urlPagina, infoTexto } = datos;

                try {
                    const htmlRes = await fetch(urlPagina, { cache: "no-store" });
                    if (!htmlRes.ok) continue;

                    const html = await htmlRes.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, "text/html");

                    const metaImg = doc.querySelector('meta[name="twitter:image"]');
                    if (!metaImg) continue;

                    const imgUrl = (metaImg.getAttribute("content") || "").trim();
                    if (!imgUrl) continue;

                    const imgUrlLower = imgUrl.split("?")[0].split("#")[0].toLowerCase();
                    const esImagenValida = (
                        imgUrlLower.endsWith(".jpg") ||
                        imgUrlLower.endsWith(".jpeg") ||
                        imgUrlLower.endsWith(".png")
                    );

                    if (!esImagenValida) continue;

                    const card = document.createElement("div");
                    card.className = "card";

                    const infoBtn = document.createElement("button");
                    infoBtn.type = "button";
                    infoBtn.className = "info-btn";
                    infoBtn.textContent = "Info";
                    infoBtn.setAttribute("aria-label", `Abrir información de ${titulo}`);

                    infoBtn.addEventListener("click", function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        abrirInfo(`${indice} - ${titulo}`, infoTexto);
                    });

                    const link = document.createElement("a");
                    link.className = "card-link";
                    link.href = urlPagina;
                    link.target = "_blank";
                    link.rel = "noopener noreferrer";
                    link.setAttribute("aria-label", `${indice} - ${titulo}`);

                    const media = document.createElement("div");
                    media.className = "card-media";

                    const img = document.createElement("img");
                    img.src = imgUrl;
                    img.alt = `${indice} - ${titulo}`;
                    img.loading = "lazy";
                    img.decoding = "async";

                    const titleDiv = document.createElement("div");
                    titleDiv.className = "card-title";
                    titleDiv.textContent = `${indice} - ${titulo}`;

                    media.appendChild(img);
                    link.appendChild(media);
                    link.appendChild(titleDiv);

                    card.appendChild(infoBtn);
                    card.appendChild(link);
                    contenedor.appendChild(card);

                    total++;
                } catch (errItem) {
                    continue;
                }
            }

            if (total === 0) {
                contenedor.innerHTML = '<div class="error">No se encontraron obras con imagen válida</div>';
            }
        } catch (err) {
            console.error(err);
            contenedor.innerHTML = '<div class="error">Error cargando la lista</div>';
        }
    }

    cargarVideos();
})();
</script>
</body>
</html>
