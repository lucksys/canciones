<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Composiciones Musicales para el Alma</title>

<!-- OPEN GRAPH -->
<meta property="og:type" content="website">
<meta property="og:title" content="Composiciones Musicales para el Alma">
<meta property="og:description" content="Una colección iniciática de obras musicales. Explora los Videos Karaoke y Canciones.">
<meta property="og:image" content="https://lucksys.github.io/canciones/portada.jpg">
<meta property="og:image:secure_url" content="https://lucksys.github.io/canciones/portada.jpg">
<meta property="og:image:type" content="image/jpg">
<meta property="og:image:width" content="1168">
<meta property="og:image:height" content="784">
<meta property="og:url" content="https://lucksys.github.io/canciones/">

<!-- TWITTER -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Composiciones Musicales para el Alma">
<meta name="twitter:description" content="Un viaje musical iniciático hacia la luz interior.">
<meta name="twitter:image" content="https://lucksys.github.io/canciones/portada.jpg">

<style>
:root {
    --gold: #d4af37;
    --bg: rgba(0,0,0,0.92);
    --panel: rgba(10,10,10,0.78);
    --card: #111;
    --text: #f3e7b3;
}

* { box-sizing: border-box; }

body {
    margin:0;
    font-family: Georgia, serif;
    background: url("portada.jpg") no-repeat center center fixed;
    background-size: cover;
    color: var(--gold);
}

.overlay {
    background: var(--bg);
    min-height:100vh;
    padding:20px;
}

h1 {
    text-align:center;
    font-size:2.4rem;
    text-shadow:0 0 15px var(--gold);
    margin-bottom:30px;
}

.container {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.column {
    flex:1;
    min-width:320px;
    border:1px solid var(--gold);
    border-radius:12px;
    padding:15px;
    background: var(--panel);
}

.grid {
    display:grid;
    grid-template-columns:1fr;
    gap:25px;
}

.card {
    position:relative;
    background: var(--card);
    border:1px solid var(--gold);
    border-radius:12px;
    overflow:hidden;
}

.card:hover {
    transform:scale(1.02);
    box-shadow:0 0 20px var(--gold);
}

.card img {
    width:100%;
    height:auto;
    object-fit:contain;
    background:#000;
}

.card-title {
    padding:12px;
    text-align:center;
    color:var(--text);
}

/* BOTON INFO */
.info-btn {
    position:absolute;
    top:8px;
    right:8px;
    width:48px;
    height:48px;
    border:1px solid var(--gold);
    background:rgba(0,0,0,0.7);
    color:var(--gold);
    cursor:pointer;
    z-index:10;
}

/* POPUP */
.info-overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.info-overlay.active {
    display:flex;
}

.info-popup {
    background:#111;
    border:1px solid var(--gold);
    padding:20px;
    max-width:90%;
    max-height:75%;
    overflow:auto;
    color:var(--text);
}

.info-popup p {
    white-space: pre-wrap;
}

.info-close {
    position:absolute;
    top:10px;
    right:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay">
<h1>Composiciones Musicales para el Alma</h1>

<div class="container">

<div class="column">
<h2>Videos Karaoke</h2>
<div id="videos" class="grid">
<div class="loading">Cargando...</div>
</div>
</div>

<div class="column">
<h2>Canciones</h2>
<p>Próximamente...</p>
</div>

</div>
</div>

<!-- POPUP -->
<div id="infoOverlay" class="info-overlay">
<div class="info-popup">
<span id="infoClose" class="info-close">✖</span>
<p id="infoTexto"></p>
</div>
</div>

<script>
(function(){

const contenedor = document.getElementById("videos");
const overlay = document.getElementById("infoOverlay");
const texto = document.getElementById("infoTexto");
const cerrar = document.getElementById("infoClose");

function abrirInfo(t){
    texto.textContent = t;
    overlay.classList.add("active");
}

cerrar.onclick = ()=> overlay.classList.remove("active");
overlay.onclick = (e)=>{ if(e.target===overlay) overlay.classList.remove("active"); };

async function cargar(){

try{

const res = await fetch("Lista_de_Enlaces_de_Videos.txt");
if(!res.ok) throw new Error();

const txt = await res.text();
const bloques = txt.split("------------------------------------------------------------------------------");

contenedor.innerHTML="";
let total=0;

for(let b of bloques){

let lineas = b.split("\n")
.map(l=>l.trim())
.filter(l=>l && !/^[-]{5,}$/.test(l));

if(lineas.length<3) continue;

let match = lineas[0].match(/^(\d+)\s*-\s*(.+)$/);
if(!match) continue;

let indice = parseInt(match[1]);
if(indice<=0) continue;

let titulo = match[2].replaceAll("_"," ");

let url = lineas.find(l=>l.includes("github.io"));
if(!url) continue;

/* =========================
   INFO MULTILINEA REAL
========================= */

let info="";
let leyendo=false;

for(let i=0;i<lineas.length;i++){

let l = lineas[i];

// inicio
if(/^info\s*:/i.test(l)){
    leyendo=true;
    info += l.replace(/^info\s*:/i,"").trim() + "\n";
    continue;
}

if(leyendo){

    // STOP conditions
    if(/^https?:\/\//.test(l)) break;
    if(/^\d+\s*-/.test(l)) break;
    if(/^[-]{5,}$/.test(l)) break;

    info += l + "\n";
}

}

info = info.trim();
if(!info) info = "Sin información disponible.";

/* ========================= */

try{

const r = await fetch(url);
if(!r.ok) throw new Error();

const html = await r.text();
const doc = new DOMParser().parseFromString(html,"text/html");

let meta = doc.querySelector('meta[name="twitter:image"]');
if(!meta) continue;

let imgUrl = meta.content;

if(!imgUrl || !imgUrl.match(/\.(jpg|jpeg|png)$/i)) continue;

/* CARD */

let card = document.createElement("div");
card.className="card";

let btn = document.createElement("button");
btn.className="info-btn";
btn.textContent="Info";

btn.onclick=(e)=>{
e.preventDefault();
e.stopPropagation();
abrirInfo(info);
};

let link = document.createElement("a");
link.href=url;
link.target="_blank";

let img = document.createElement("img");
img.src=imgUrl;

let t = document.createElement("div");
t.className="card-title";
t.textContent=indice+" - "+titulo;

card.appendChild(img);
card.appendChild(btn);
card.appendChild(t);

link.appendChild(card);
contenedor.appendChild(link);

total++;

}catch{}

}

if(total===0){
contenedor.innerHTML='<div class="error">No se encontraron obras</div>';
}

}catch{
contenedor.innerHTML='<div class="error">Error cargando lista</div>';
}

}

cargar();

})();
</script>

</body>
</html>
