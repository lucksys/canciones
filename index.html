<script>
(function () {
    const contenedor = document.getElementById("videos");
    const infoOverlay = document.getElementById("infoOverlay");
    const infoTitulo = document.getElementById("infoTitulo");
    const infoTexto = document.getElementById("infoTexto");
    const infoClose = document.getElementById("infoClose");

    function abrirInfo(titulo, texto) {
        infoTitulo.textContent = titulo || "Información";
        infoTexto.textContent = texto || "Sin información disponible.";
        infoOverlay.classList.add("active");
        infoOverlay.setAttribute("aria-hidden", "false");
    }

    function cerrarInfo() {
        infoOverlay.classList.remove("active");
        infoOverlay.setAttribute("aria-hidden", "true");
    }

    infoClose.addEventListener("click", cerrarInfo);

    infoOverlay.addEventListener("click", function (e) {
        if (e.target === infoOverlay) cerrarInfo();
    });

    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") cerrarInfo();
    });

    function limpiarTextoTitulo(texto) {
        return texto.replaceAll("_", " ").trim();
    }

    function limpiarValor(valor) {
        return valor.replace(/^["']|["']$/g, "").trim();
    }

    function extraerDatosBloque(lineas) {
        if (!lineas || lineas.length < 3) return null;

        const match = lineas[0].match(/^\s*(\d+)\s*-\s*(.+)$/);
        if (!match) return null;

        const indice = parseInt(match[1], 10);
        const titulo = limpiarTextoTitulo(match[2]);

        let imagen = null;
        let video = null;
        let cancion = null;
        let infoTexto = "Sin información disponible.";

        for (let l of lineas) {
            if (/^imagen\s*:/i.test(l)) {
                imagen = limpiarValor(l.split(":").slice(1).join(":"));
            }
            if (/^video\s*:/i.test(l)) {
                video = limpiarValor(l.split(":").slice(1).join(":"));
            }
            if (/^cancion\s*:/i.test(l)) {
                cancion = limpiarValor(l.split(":").slice(1).join(":"));
            }
        }

        const infoIndex = lineas.findIndex(l => /^info\s*:/i.test(l));
        if (infoIndex !== -1) {
            infoTexto = lineas.slice(infoIndex)
                .map((l, i) => i === 0 ? l.replace(/^info\s*:/i, "").trim() : l)
                .join("\n")
                .trim();
        }

        if (!imagen) return null;

        return { indice, titulo, imagen, video, cancion, infoTexto };
    }

    async function cargarVideos() {
        contenedor.innerHTML = '<div class="loading">Cargando obras iniciáticas...</div>';

        try {
            const res = await fetch("Lista_de_Enlaces_de_Videos.txt", { cache: "no-store" });
            if (!res.ok) throw new Error("No se pudo leer el archivo");

            const texto = await res.text();
            const bloques = texto.split("------------------------------------------------------------------------------");

            contenedor.innerHTML = "";

            let total = 0;

            for (const bloqueRaw of bloques) {
                const lineas = bloqueRaw.trim()
                    .split("\n")
                    .map(l => l.trim())
                    .filter(Boolean);

                const datos = extraerDatosBloque(lineas);
                if (!datos) continue;

                const { indice, titulo, imagen, video, cancion, infoTexto } = datos;

                const card = document.createElement("div");
                card.className = "card";

                const infoBtn = document.createElement("button");
                infoBtn.className = "info-btn";
                infoBtn.textContent = "Info";

                infoBtn.onclick = (e) => {
                    e.stopPropagation();
                    abrirInfo(`${indice} - ${titulo}`, infoTexto);
                };

                const link = document.createElement("a");
                link.className = "card-link";
                link.href = video || "#";
                link.target = "_blank";

                const media = document.createElement("div");
                media.className = "card-media";

                const img = document.createElement("img");
                img.src = imagen;
                img.alt = titulo;

                const titleDiv = document.createElement("div");
                titleDiv.className = "card-title";
                titleDiv.textContent = `${indice} - ${titulo}`;

                const btnCancion = document.createElement("button");
                btnCancion.textContent = "Solo canción";
                btnCancion.style.width = "100%";
                btnCancion.onclick = (e) => {
                    e.stopPropagation();
                    window.open(cancion, "_blank");
                };

                media.appendChild(img);
                link.appendChild(media);
                link.appendChild(titleDiv);

                card.appendChild(infoBtn);
                card.appendChild(link);
                card.appendChild(btnCancion);

                contenedor.appendChild(card);

                total++;
            }

            if (total === 0) {
                contenedor.innerHTML = '<div class="error">No se encontraron obras válidas</div>';
            }

        } catch (err) {
            console.error(err);
            contenedor.innerHTML = '<div class="error">Error cargando la lista</div>';
        }
    }

    cargarVideos();
})();
</script>
