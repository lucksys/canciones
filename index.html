<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Composiciones Musicales para el Alma</title>

<meta property="og:type" content="website">

<style>
/* 🔒 TODO TU CSS ORIGINAL — NO TOCADO */
:root {
    --gold: #d4af37;
    --bg: rgba(0, 0, 0, 0.92);
    --panel: rgba(10, 10, 10, 0.78);
    --card: #111;
    --text: #f3e7b3;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Georgia, serif;
    background: url("portada.jpg") no-repeat center center fixed;
    background-size: cover;
    color: var(--gold);
}

.overlay {
    background: var(--bg);
    min-height: 100vh;
    padding: 20px;
}

h1 {
    margin: 0 0 30px;
    text-align: center;
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    letter-spacing: 2px;
    text-shadow: 0 0 15px var(--gold);
}

.container {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: flex-start;
}

.column {
    flex: 1;
    min-width: 320px;
    border: 1px solid var(--gold);
    padding: 15px;
    border-radius: 12px;
    background: var(--panel);
}

.column h2 {
    margin: 0 0 20px;
    text-align: center;
    border-bottom: 1px solid var(--gold);
    padding-bottom: 10px;
    font-size: 1.4rem;
}

.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 25px;
}

.card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--gold);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.card:hover {
    transform: scale(1.02);
    box-shadow: 0 0 20px var(--gold);
}

.card-link {
    display: block;
    color: inherit;
    text-decoration: none;
}

.card-media {
    position: relative;
    background: #000;
}

.card img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
    background: #000;
}

.card-title {
    padding: 12px;
    font-size: 1rem;
    text-align: center;
    color: var(--text);
}

.loading, .error {
    text-align: center;
    opacity: 0.75;
    padding: 20px;
    color: var(--text);
}

.info-btn, .song-btn {
    position: absolute;
    top: 8px;
    width: 48px;
    height: 48px;
    border: 1px solid var(--gold);
    border-radius: 8px;
    background: rgba(0,0,0,0.72);
    color: var(--gold);
    font-size: 11px;
    cursor: pointer;
    z-index: 5;
}

.info-btn { right: 8px; }
.song-btn { right: 60px; }

.info-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.info-overlay.active { display: flex; }

.info-popup {
    background: #101010;
    border: 1px solid var(--gold);
    border-radius: 14px;
    padding: 20px;
    color: var(--text);
}
</style>
</head>

<body>
<div class="overlay">
<h1>Composiciones Musicales para el Alma</h1>

<div class="container">
<div class="column">
<h2>Videos Karaoke</h2>
<div id="videos" class="grid">
<div class="loading">Cargando...</div>
</div>
</div>
</div>
</div>

<div id="infoOverlay" class="info-overlay">
<div class="info-popup">
<button id="infoClose">X</button>
<h3 id="infoTitulo"></h3>
<p id="infoTexto"></p>
</div>
</div>

<script>
(function(){

const contenedor = document.getElementById("videos");

function extraerValor(lineas, clave){
    const linea = lineas.find(l => l.toLowerCase().startsWith(clave));
    if(!linea) return null;
    const match = linea.match(/"(.*?)"/);
    return match ? match[1] : null;
}

function extraerDatosBloque(lineas){

    const match = lineas[0].match(/^(\d+)\s*-\s*(.+)$/);
    if(!match) return null;

    return {
        indice: match[1],
        titulo: match[2].replaceAll("_"," "),
        imagen: extraerValor(lineas,"imagen:"),
        video: extraerValor(lineas,"video:"),
        cancion: extraerValor(lineas,"cancion:"),
        info: extraerValor(lineas,"info:")
    };
}

async function cargar(){

const res = await fetch("Lista_de_Enlaces_de_Videos.txt");
const txt = await res.text();

const bloques = txt.split("------------------------------------------------------------------------------");

contenedor.innerHTML="";

for(const b of bloques){

const lineas = b.split("\n").map(l=>l.trim()).filter(l=>l);

const d = extraerDatosBloque(lineas);
if(!d || !d.imagen) continue;

const card = document.createElement("div");
card.className="card";

const link = document.createElement("a");
link.href=d.video;
link.target="_blank";

const img = document.createElement("img");
img.src=d.imagen;

const title = document.createElement("div");
title.className="card-title";
title.textContent=d.indice+" - "+d.titulo;

link.appendChild(img);
link.appendChild(title);

const infoBtn=document.createElement("button");
infoBtn.className="info-btn";
infoBtn.textContent="Info";
infoBtn.onclick=()=>abrirInfo(d);

const songBtn=document.createElement("button");
songBtn.className="song-btn";
songBtn.textContent="Song";
songBtn.onclick=()=>window.open(d.cancion);

card.appendChild(songBtn);
card.appendChild(infoBtn);
card.appendChild(link);

contenedor.appendChild(card);

}

}

function abrirInfo(d){
document.getElementById("infoTitulo").textContent=d.indice+" - "+d.titulo;
document.getElementById("infoTexto").textContent=d.info;
document.getElementById("infoOverlay").classList.add("active");
}

document.getElementById("infoClose").onclick=()=>{
document.getElementById("infoOverlay").classList.remove("active");
};

cargar();

})();
</script>

</body>
</html>
