<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Composiciones Musicales para el Alma</title>

<!-- OPEN GRAPH -->
<meta property="og:type" content="website">
<meta property="og:title" content="Composiciones Musicales para el Alma">
<meta property="og:description" content="Una colección iniciática de obras musicales. Explora los Videos Karaoke y Cancioe.">
<meta property="og:image" content="https://lucksys.github.io/canciones/portada.jpg">
<meta property="og:image:secure_url" content="https://lucksys.github.io/canciones/portada.jpg">

<meta property="og:image:height" content="784">

<!-- TWITTER -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Composiciones Musicales para el Alma">
<meta name="twitter:description" content="Un viaje musical iniciático hacia la luz interior.">
<meta name="twitter:image" content="https://lucksys.github.io/canciones/portada.jpg">

<style>
:root {
    --gold: #d4af37;
    --bg: rgba(0, 0, 0, 0.92);
    --panel: rgba(10, 10, 10, 0.78);
    --card: #111;
    --text: #f3e7b3;
}
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: Georgia, serif;
    background: url("portada.jpg") no-repeat center center fixed;
    background-size: cover;
    color: var(--gold);
}
.overlay {
    background: var(--bg);
    min-height: 100vh;
    padding: 20px;
}
h1 {
    margin: 0 0 30px;
    text-align: center;
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    letter-spacing: 2px;
    text-shadow: 0 0 15px var(--gold);
}
.container {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: flex-start;
}
.column {
    flex: 1;
    min-width: 320px;
    border: 1px solid var(--gold);
    padding: 15px;
    border-radius: 12px;
    background: var(--panel);
}
.column h2 {
    margin: 0 0 20px;
    text-align: center;
    border-bottom: 1px solid var(--gold);
    padding-bottom: 10px;
    font-size: 1.4rem;
}
.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 25px;
}
.card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--gold);
    border-radius: 12px;
    overflow: hidden;
}
.card-link {
    display: block;
    color: inherit;
    text-decoration: none;
}
.card img {
    width: 100%;
    background: #000;
}
.card-title {
    padding: 12px;
    text-align: center;
    color: var(--text);
}
.loading, .error {
    text-align: center;
    padding: 20px;
    color: var(--text);
}
.info-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 48px;
    height: 48px;
    border: 1px solid var(--gold);
    background: rgba(0,0,0,0.7);
    color: var(--gold);
    cursor: pointer;
}
</style>
</head>

<body>
<div class="overlay">
    <h1>Composiciones Musicales para el Alma</h1>

    <div class="container">
        <div class="column">
            <h2>Videos Karaoke</h2>
            <div id="videos" class="grid">
                <div class="loading">Cargando obras iniciáticas...</div>
            </div>
        </div>

        <div class="column">
            <h2>Video-Presentaciones</h2>
            <div class="grid">
                <p class="loading">Próximamente...</p>
            </div>
        </div>
    </div>
</div>

<div id="infoOverlay" class="info-overlay">
    <div class="info-popup">
        <button id="infoClose">×</button>
        <h3 id="infoTitulo"></h3>
        <p id="infoTexto"></p>
    </div>
</div>

<script>
(function () {

const contenedor = document.getElementById("videos");

function limpiarTextoTitulo(texto) {
    return texto.replaceAll("_", " ").trim();
}

function limpiarValor(v) {
    return v.replace(/^["']|["']$/g, "").trim();
}

function extraerDatosBloque(lineas) {

    const match = lineas[0].match(/^(\d+)\s*-\s*(.+)$/);
    if (!match) return null;

    const indice = parseInt(match[1], 10);
    const titulo = limpiarTextoTitulo(match[2]);

    let imagen = null;
    let video = null;
    let cancion = null;
    let infoTexto = "Sin información disponible.";

    lineas.forEach(l => {
        if (/^imagen:/i.test(l)) imagen = limpiarValor(l.split(":").slice(1).join(":"));
        if (/^video:/i.test(l)) video = limpiarValor(l.split(":").slice(1).join(":"));
        if (/^cancion:/i.test(l)) cancion = limpiarValor(l.split(":").slice(1).join(":"));
    });

    const infoIndex = lineas.findIndex(l => /^info\s*:/i.test(l));
    if (infoIndex !== -1) {
        infoTexto = lineas.slice(infoIndex)
            .map((l, i) => i === 0 ? l.replace(/^info\s*:/i, "").trim() : l)
            .join("\n")
            .trim();
    }

    if (!imagen) return null;

    return { indice, titulo, imagen, video, cancion, infoTexto };
}

async function cargarVideos() {

    try {
        const res = await fetch("Lista_de_Enlaces_de_Videos.txt", { cache: "no-store" });
        if (!res.ok) throw new Error();

        const texto = await res.text();
        const bloques = texto.split("------------------------------------------------------------------------------");

        contenedor.innerHTML = "";

        let total = 0;

        for (const bloqueRaw of bloques) {

            const lineas = bloqueRaw.trim()
                .split("\n")
                .map(l => l.trim())
                .filter(Boolean);

            const d = extraerDatosBloque(lineas);
            if (!d) continue;

            const card = document.createElement("div");
            card.className = "card";

            const infoBtn = document.createElement("button");
            infoBtn.className = "info-btn";
            infoBtn.textContent = "Info";
            infoBtn.onclick = (e)=>{
                e.stopPropagation();
                abrirInfo(`${d.indice} - ${d.titulo}`, d.infoTexto);
            };

            const link = document.createElement("a");
            link.className = "card-link";
            link.href = d.video || "#";
            link.target = "_blank";

            const img = document.createElement("img");
            img.src = d.imagen;

            const title = document.createElement("div");
            title.className = "card-title";
            title.textContent = d.indice + " - " + d.titulo;

            const btn = document.createElement("button");
            btn.textContent = "Solo canción";
            btn.style.width = "100%";
            btn.onclick = (e)=>{
                e.stopPropagation();
                if (d.cancion) window.open(d.cancion,"_blank");
            };

            link.appendChild(img);
            link.appendChild(title);

            card.appendChild(infoBtn);
            card.appendChild(link);
            card.appendChild(btn);

            contenedor.appendChild(card);

            total++;
        }

        if (total === 0) {
            contenedor.innerHTML = '<div class="error">No se encontraron obras válidas</div>';
        }

    } catch {
        contenedor.innerHTML = '<div class="error">Error cargando la lista</div>';
    }
}

function abrirInfo(titulo, texto){
    document.getElementById("infoTitulo").textContent = titulo;
    document.getElementById("infoTexto").textContent = texto;
    document.getElementById("infoOverlay").classList.add("active");
}

document.getElementById("infoClose").onclick = ()=>{
    document.getElementById("infoOverlay").classList.remove("active");
};

cargarVideos();

})();
</script>

</body>
</html>
